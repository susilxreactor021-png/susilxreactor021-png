<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#021" />
      <stop offset="1" stop-color="#001" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Matrix-style columns -->
  <g fill="#00ff66" font-family="monospace" font-size="14" opacity="0.25">
    <!-- Repeat several columns of binary text for visual effect -->
    <g transform="translate(60,40)">
      <text x="0" y="0">101100101001011010101010011010</text>
    </g>
    <g transform="translate(140,80)">
      <text x="0" y="0">010010110100101101001010110010</text>
    </g>
    <g transform="translate(220,20)">
      <text x="0" y="0">111010001011001001110010100101</text>
    </g>
    <g transform="translate(320,120)">
      <text x="0" y="0">001100111010010101010011100101</text>
    </g>
    <g transform="translate(420,60)">
      <text x="0" y="0">101011001010010101001011001010</text>
    </g>
    <g transform="translate(520,40)">
      <text x="0" y="0">010101011100101001010110010101</text>
    </g>
    <g transform="translate(640,80)">
      <text x="0" y="0">111001010010101001010010110011</text>
    </g>
    <g transform="translate(760,20)">
      <text x="0" y="0">001010101101001010110010101100</text>
    </g>
  </g>

  <!-- Outer glow circle -->
  <circle cx="512" cy="420" r="380" fill="none" stroke="#00ff66" stroke-opacity="0.03" stroke-width="60"/>

  <!-- Hat -->
  <g transform="translate(0, -70)">
    <ellipse cx="512" cy="175" rx="320" ry="100" fill="#003300" opacity="0.95"/>
    <path d="M192,180 C192,110 280,60 512,60 C744,60 832,110 832,180 C832,210 700,210 512,210 C324,210 192,210 192,180 Z" fill="#00a84b" stroke="#00722b" stroke-width="6" filter="url(#glow)"/>
    <rect x="260" y="200" width="508" height="28" rx="14" fill="#003300"/>
  </g>

  <!-- Face base -->
  <g transform="translate(0, 40)">
    <ellipse cx="512" cy="520" rx="260" ry="300" fill="#ffffff" stroke="#e6e6e6" stroke-width="2"/>

    <!-- Eyes -->
    <g fill="#000000" transform="translate(0,10)">
      <ellipse cx="420" cy="460" rx="42" ry="30" />
      <ellipse cx="604" cy="460" rx="42" ry="30" />
      <path d="M380 420 C420 400, 540 400, 580 420" stroke="#111" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Moustache -->
    <g fill="#000" transform="translate(0,60)">
      <path d="M352 600 C392 580, 430 590, 464 604 C456 610, 424 610, 384 596 C360 588, 352 600, 352 600 Z"/>
      <path d="M672 600 C632 580, 594 590, 560 604 C568 610, 600 610, 640 596 C664 588, 672 600, 672 600 Z"/>
      <path d="M444 632 C470 658, 554 658, 580 632 C562 650, 476 650, 444 632 Z"/>
    </g>

    <!-- Goatee -->
    <path d="M512 700 C490 720, 470 760, 512 780 C554 760, 534 720, 512 700 Z" fill="#000"/>

    <!-- Mouth line -->
    <path d="M420 540 C470 560, 554 560, 604 540" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Subtle highlight and border -->
  <circle cx="512" cy="420" r="380" fill="none" stroke="#00ff66" stroke-opacity="0.02" stroke-width="8"/>

  <!-- Small badge border -->
  <circle cx="880" cy="880" r="64" fill="#00ff66" opacity="0.06"/>

</svg>
