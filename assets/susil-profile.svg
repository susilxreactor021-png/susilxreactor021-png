<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#062014" />
      <stop offset="1" stop-color="#001119" />
    </linearGradient>
    <radialGradient id="hatGrad" cx="50%" cy="20%">
      <stop offset="0" stop-color="#2ff67a" stop-opacity="1"/>
      <stop offset="1" stop-color="#00722b" stop-opacity="1"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Subtle matrix lines -->
  <g fill="#00ff66" font-family="monospace" font-size="12" opacity="0.12">
    <text x="60" y="60">0100101011100101001010110100101101</text>
    <text x="180" y="110">1010010101011001010101010010101010</text>
    <text x="360" y="50">1110001010010101010010101100101010</text>
    <text x="520" y="140">0010010101010110010100101010101011</text>
    <text x="700" y="80">1101001010100101101001010010101100</text>
  </g>

  <!-- Glow halo behind head -->
  <circle cx="512" cy="420" r="360" fill="#00ff66" opacity="0.03" />

  <!-- Hat (stylized fedora) -->
  <g filter="url(#softGlow)">
    <path d="M160 230 C180 140 300 80 512 80 C724 80 844 140 864 230 C720 270 304 270 160 230 Z" fill="url(#hatGrad)" stroke="#004a20" stroke-width="6"/>
    <ellipse cx="512" cy="270" rx="380" ry="48" fill="#003016" opacity="0.9"/>
    <rect x="300" y="240" width="424" height="34" rx="16" fill="#002d15"/>
  </g>

  <!-- Mask / Face base -->
  <g>
    <path d="M512 160 C380 160 260 320 290 520 C320 720 430 840 512 840 C594 840 704 720 734 520 C764 320 644 160 512 160 Z" fill="#ffffff" stroke="#e6e6e6" stroke-width="2"/>

    <!-- Eyes (slanted almond) -->
    <g fill="#000">
      <path d="M380 420 C400 380 460 380 480 420 C460 410 400 410 380 420 Z"/>
      <path d="M544 420 C564 380 624 380 644 420 C624 410 564 410 544 420 Z"/>
      <ellipse cx="420" cy="420" rx="10" ry="6" fill="#000" opacity="0.0"/>
    </g>

    <!-- Nose ridge -->
    <path d="M512 450 C508 430 504 430 500 450" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Smile and upper mouth lines -->
    <path d="M420 500 C470 540 554 540 604 500" stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/> 
    <path d="M384 470 C424 460 600 460 640 470" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>

    <!-- Moustache (curled) -->
    <g fill="#000">
      <path d="M352 560 C388 540 420 552 456 570 C428 558 392 548 352 560 Z"/>
      <path d="M672 560 C636 540 604 552 568 570 C596 558 632 548 672 560 Z"/>
      <path d="M390 590 C430 610 590 610 634 590 C600 606 436 606 390 590 Z"/>
    </g>

    <!-- Goatee -->
    <path d="M512 660 C490 700 470 742 512 760 C554 742 534 700 512 660 Z" fill="#000"/>
  </g>

  <!-- Outer ring highlight -->
  <circle cx="512" cy="420" r="360" fill="none" stroke="#00ff66" stroke-opacity="0.02" stroke-width="8"/>

  <!-- Small badge accent -->
  <circle cx="880" cy="880" r="64" fill="#00ff66" opacity="0.04"/>

</svg>
