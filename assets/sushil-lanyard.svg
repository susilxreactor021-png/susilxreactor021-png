<svg xmlns="http://www.w3.org/2000/svg" width="360" height="520" viewBox="0 0 360 520" role="img" aria-labelledby="title desc">
<title id="title">Sushil Thapa developer ID card</title>
<desc id="desc">Animated cybersecurity-themed lanyard and developer identity badge</desc>
<defs>
  <linearGradient id="strap" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#00e5ff"/>
    <stop offset=".5" stop-color="#8b5cf6"/>
    <stop offset="1" stop-color="#00e676"/>
  </linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#111827"/>
    <stop offset=".55" stop-color="#0b1220"/>
    <stop offset="1" stop-color="#171033"/>
  </linearGradient>
  <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity=".48"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .swing { transform-origin: 180px 15px; animation: swing 4.8s ease-in-out infinite; }
    @keyframes swing {
      0%,100% { transform: rotate(-2.3deg); }
      50% { transform: rotate(2.3deg); }
    }
  </style>
</defs>
<rect width="360" height="520" fill="transparent"/>
<g class="swing">
  <path d="M148 0 L164 194" stroke="url(#strap)" stroke-width="16" stroke-linecap="round"/>
  <path d="M212 0 L196 194" stroke="url(#strap)" stroke-width="16" stroke-linecap="round"/>
  <g font-family="monospace" font-size="7" font-weight="700" fill="#ffffff" letter-spacing="1">
    <text transform="translate(152 26) rotate(85)">SUSHIL • BACKEND • SECURITY •</text>
    <text transform="translate(207 28) rotate(95)">ETHICAL • BUILD • DEFEND •</text>
  </g>
  <rect x="162" y="168" width="36" height="31" rx="8" fill="#7c8798" stroke="#dbeafe" stroke-width="2"/>
  <rect x="170" y="191" width="20" height="30" rx="9" fill="#111827" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="180" cy="207" r="5" fill="#0d1117" stroke="#cbd5e1"/>
  <g filter="url(#shadow)">
    <rect x="48" y="212" width="264" height="276" rx="24" fill="url(#card)" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="62" y="226" width="236" height="248" rx="17" fill="none" stroke="#00e5ff" stroke-opacity=".32"/>
    <text x="76" y="248" fill="#94a3b8" font-family="monospace" font-size="8" letter-spacing="2">DEVELOPER ID</text>
    <text x="286" y="248" text-anchor="end" fill="#00e676" font-family="monospace" font-size="8">ST-021</text>
    <circle cx="180" cy="304" r="48" fill="#080b12" stroke="url(#strap)" stroke-width="3"/>
    <circle cx="180" cy="304" r="39" fill="#111827" stroke="#334155"/>
    <path d="M161 299 L180 280 L199 299 L192 323 L180 331 L168 323 Z" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glow)"/>
    <path d="M169 302 H191 M174 311 H186" stroke="#00e676" stroke-width="3" stroke-linecap="round"/>
    <text x="180" y="373" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800">Sushil Thapa</text>
    <text x="180" y="397" text-anchor="middle" fill="#00e5ff" font-family="monospace" font-size="11" font-weight="700">BACKEND DEVELOPER</text>
    <text x="180" y="417" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">ETHICAL HACKING STUDENT</text>
    <text x="180" y="439" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">@susilxreactor021-png</text>
    <g fill="#dbeafe">
